name: Build Provenance

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  build-and-attest:
    name: Build and Attest
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run -s build

      - name: Prepare bundle
        run: |
          tar -czf release-bundle.tgz dist dist-micro package.json package-lock.json README.md

      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-bundle
          path: release-bundle.tgz
          retention-days: 30

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: release-bundle.tgz
