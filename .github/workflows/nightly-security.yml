name: Nightly Security

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nightly-security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security-baseline:
    name: Security Baseline Scan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run -s build

      - name: Test
        run: npm run -s test

      - name: Lint
        run: npm run -s lint

      - name: npm audit (high+)
        run: npm audit --audit-level=high

      - name: Trivy scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          format: table
          ignore-unfixed: true
          exit-code: "1"

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate SPDX SBOM
        run: npm sbom --sbom-format spdx --json > sbom-nightly.spdx.json

      - name: Upload nightly reports
        uses: actions/upload-artifact@v4
        with:
          name: nightly-security-artifacts
          path: |
            sbom-nightly.spdx.json
          retention-days: 14
